---
name: ci

"on":
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-unit:
    uses: sous-chefs/.github/.github/workflows/lint-unit.yml@7.0.0
    permissions:
      actions: write
      checks: write
      pull-requests: write
      statuses: write

  integration:
    needs: lint-unit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - "amazonlinux-2023"
          - "almalinux-8"
          - "almalinux-9"
          - "centos-stream-9"
          - "debian-12"
          - "debian-13"
          - "oraclelinux-8"
          - "oraclelinux-9"
          - "rockylinux-8"
          - "rockylinux-9"
          - "ubuntu-2204"
          - "ubuntu-2404"
        suite:
          - "default"
          - "clear-cache"
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - name: Install Chef
        uses: sous-chefs/.github/.github/actions/install-workstation@7.0.0
      - name: Test Kitchen
        run: chef exec kitchen test ${{ matrix.suite }}-${{ matrix.os }} --destroy=always
        env:
          CHEF_LICENSE: accept
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
